<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل الصوت المتطور - Plyr</title>
    <!-- مكتبة Plyr للصوت والفيديو -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.6.12/plyr.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a1a1a 0%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .player-container {
            width: 100%;
            max-width: 600px;
            background: #000000;
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
        }

        h2 {
            color: #fff;
            margin-bottom: 2rem;
            text-align: center;
            font-size: 1.8rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo img {
            max-width: 150px;
            border-radius: 15px;
        }

        /* حقل إدخال الرابط */
        .url-section {
            margin-bottom: 2rem;
            background: #111;
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid #333;
        }

        .url-label {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .url-input-group {
            display: flex;
            gap: 10px;
        }

        #audioUrl {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            border-radius: 30px;
            padding: 12px 20px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            direction: ltr;
        }

        #loadBtn {
            background: #00a7ad;
            border: none;
            border-radius: 30px;
            padding: 0 25px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #0bc5cc;
        }

        #loadBtn:hover {
            background: #0bc5cc;
            transform: scale(1.02);
        }

        /* معلومات البث */
        .stream-info {
            background: #111;
            border-radius: 15px;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .live-badge {
            background: #f00;
            color: #fff;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .station-name {
            color: #00a7ad;
            font-size: 1rem;
            font-weight: 600;
        }

        /* أزرار التحكم المخصصة */
        .custom-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .control-btn {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }

        .control-btn:hover {
            border-color: #00a7ad;
            transform: scale(1.1);
        }

        .control-btn span {
            font-size: 1.2rem;
        }

        /* قائمة الروابط السريعة */
        .quick-links {
            margin-top: 2rem;
            background: #111;
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid #333;
        }

        .quick-title {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }

        .link-item {
            background: #222;
            border: 1px solid #444;
            border-radius: 30px;
            padding: 8px 12px;
            color: #ddd;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-item:hover {
            background: #333;
            border-color: #00a7ad;
            color: #fff;
        }

        /* إخفاء عناصر الصوت الافتراضية */
        audio {
            width: 100%;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <h2>🎵 مشغل الصوت المتطور</h2>
        
        <!-- قسم إدخال الرابط -->
        <div class="url-section">
            <div class="url-label">رابط الصوت / البث المباشر</div>
            <div class="url-input-group">
                <input type="url" id="audioUrl" placeholder="https://example.com/audio.mp3 أو رابط m3u8" value="http://anisfm.ddns.net">
                <button id="loadBtn">تحميل</button>
            </div>
        </div>

        <!-- عنصر الصوت -->
        <audio id="audioPlayer" controls crossorigin="anonymous">
            <source src="http://anisfm.ddns.net" type="audio/mpeg">
            متصفحك لا يدعم مشغل الصوت.
        </audio>

        <!-- معلومات البث المباشر -->
        <div class="stream-info" id="streamInfo">
            <span class="station-name" id="stationName">anisfm.ddns.net</span>
            <span class="live-badge" id="liveBadge">🔴 مباشر</span>
        </div>

        <!-- أزرار تحكم إضافية -->
        <div class="custom-controls">
            <button class="control-btn" id="delay1Btn">
                <span>⏪</span>
                <span>1ث</span>
            </button>
            <button class="control-btn" id="delay3Btn">
                <span>⏪</span>
                <span>3ث</span>
            </button>
            <button class="control-btn" id="delay5Btn">
                <span>⏪</span>
                <span>5ث</span>
            </button>
            <button class="control-btn" id="delay10Btn">
                <span>⏪</span>
                <span>10ث</span>
            </button>
            <button class="control-btn" id="reconnectBtn">
                <span>🔄</span>
                <span>إعادة</span>
            </button>
        </div>

        <!-- قائمة روابط سريعة -->
        <div class="quick-links">
            <div class="quick-title">📻 روابط تجريبية (بث مباشر)</div>
            <div class="links-grid">
                <div class="link-item" data-url="http://anisfm.ddns.net">راديو أنس</div>
                <div class="link-item" data-url="http://icecast.omroep.nl/radio1-bb-mp3">NPO Radio 1</div>
                <div class="link-item" data-url="http://stream.live.vc.bbcmedia.co.uk/bbc_world_service">BBC World</div>
                <div class="link-item" data-url="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">موسيقى تجريبية</div>
            </div>
        </div>
    </div>

    <!-- تحميل المكتبات - تم تصحيح رابط HLS.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.plyr.io/3.6.12/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>

    <script>
        (function() {
            // عناصر الصفحة
            const audioElement = document.getElementById('audioPlayer');
            const audioUrlInput = document.getElementById('audioUrl');
            const loadBtn = document.getElementById('loadBtn');
            const stationName = document.getElementById('stationName');
            const liveBadge = document.getElementById('liveBadge');
            
            // أزرار التحكم
            const delay1Btn = document.getElementById('delay1Btn');
            const delay3Btn = document.getElementById('delay3Btn');
            const delay5Btn = document.getElementById('delay5Btn');
            const delay10Btn = document.getElementById('delay10Btn');
            const reconnectBtn = document.getElementById('reconnectBtn');
            
            // الروابط السريعة
            const quickLinks = document.querySelectorAll('.link-item');

            // متغيرات
            let player = null;
            let hls = null;

            // دالة تهيئة مشغل Plyr
            function initPlayer(sourceUrl) {
                try {
                    // تحديث المصدر في عنصر audio
                    audioElement.src = sourceUrl;
                    audioElement.load();
                    
                    // إذا كان هناك مشغل سابق، قم بتدميره
                    if (player) {
                        player.destroy();
                    }
                    
                    // تهيئة مشغل Plyr جديد
                    player = new Plyr(audioElement, {
                        controls: ['play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings'],
                        settings: ['speed'],
                        i18n: {
                            speed: 'السرعة',
                            normal: 'عادي'
                        }
                    });

                    // دعم HLS (البث المباشر)
                    if (sourceUrl.includes('.m3u8')) {
                        liveBadge.style.display = 'inline-block';
                        liveBadge.textContent = '🔴 مباشر HLS';
                        
                        // استخدام HLS.js إذا كان متاحاً
                        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                            if (hls) {
                                hls.destroy();
                            }
                            hls = new Hls();
                            hls.loadSource(sourceUrl);
                            hls.attachMedia(audioElement);
                            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                                audioElement.play().catch(e => console.log('التشغيل التلقائي محظور'));
                            });
                        } else if (audioElement.canPlayType('application/vnd.apple.mpegurl')) {
                            // دعم Safari الأصلي
                            audioElement.src = sourceUrl;
                        }
                    } else {
                        liveBadge.style.display = 'inline-block';
                        liveBadge.textContent = '🔴 مباشر';
                    }

                    // تحديث اسم المحطة من الرابط
                    try {
                        const urlObj = new URL(sourceUrl);
                        stationName.textContent = urlObj.hostname || 'مصدر صوتي';
                    } catch(e) {
                        stationName.textContent = sourceUrl.split('/').pop() || 'ملف صوتي';
                    }

                    // حدث عند التشغيل
                    player.on('playing', () => {
                        liveBadge.textContent = '🔴 مباشر';
                    });

                    // حدث عند التوقف
                    player.on('pause', () => {
                        liveBadge.textContent = '⏸ متوقف';
                    });

                    // حدث عند انتهاء البث (للملفات)
                    player.on('ended', () => {
                        liveBadge.textContent = '⏹ انتهى';
                    });

                } catch(error) {
                    console.error('خطأ في تهيئة المشغل:', error);
                    alert('حدث خطأ في تهيئة المشغل. الرجاء التحقق من الرابط.');
                }
            }

            // دالة تأخير الصوت
            function delayAudio(seconds) {
                if (player && audioElement) {
                    const currentTime = audioElement.currentTime;
                    if (currentTime > 0 && !isNaN(currentTime)) {
                        audioElement.currentTime = Math.max(0, currentTime - seconds);
                    }
                }
            }

            // دالة إعادة الاتصال
            function reconnect() {
                const currentSrc = audioUrlInput.value.trim() || audioElement.src;
                if (currentSrc) {
                    initPlayer(currentSrc);
                }
            }

            // حدث تحميل الرابط
            loadBtn.addEventListener('click', () => {
                const url = audioUrlInput.value.trim();
                if (url) {
                    initPlayer(url);
                } else {
                    alert('الرجاء إدخال رابط');
                }
            });

            // أحداث أزرار التأخير
            delay1Btn.addEventListener('click', () => delayAudio(1));
            delay3Btn.addEventListener('click', () => delayAudio(3));
            delay5Btn.addEventListener('click', () => delayAudio(5));
            delay10Btn.addEventListener('click', () => delayAudio(10));
            reconnectBtn.addEventListener('click', reconnect);

            // أحداث الروابط السريعة
            quickLinks.forEach(link => {
                link.addEventListener('click', () => {
                    const url = link.getAttribute('data-url');
                    if (url) {
                        audioUrlInput.value = url;
                        initPlayer(url);
                    }
                });
            });

            // تهيئة المشغل تلقائياً
            window.addEventListener('load', () => {
                setTimeout(() => {
                    initPlayer('http://anisfm.ddns.net');
                }, 500);
            });
        })();
    </script>
</body>
</html>
