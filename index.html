<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماكس بلاير - تحكم بتأخير الصوت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a1a1a 0%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .max-player {
            width: 100%;
            max-width: 600px;
            background: #000000;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid #222;
        }

        /* المنطقة البصرية */
        .visualizer {
            background: #0a0a0a;
            border-radius: 40px;
            height: 120px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #222;
            background-image: radial-gradient(circle at 25% 30%, #1a1a1a 0%, #000 100%);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .visualizer-icon {
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 2;
        }

        .visualizer-icon span {
            width: 6px;
            height: 40px;
            background: #444;
            border-radius: 10px;
            animation: wave 1.2s infinite ease-in-out;
        }

        .visualizer-icon span:nth-child(1) { animation-delay: 0s; background: #666; }
        .visualizer-icon span:nth-child(2) { animation-delay: 0.2s; background: #888; }
        .visualizer-icon span:nth-child(3) { animation-delay: 0.4s; background: #aaa; }
        .visualizer-icon span:nth-child(4) { animation-delay: 0.3s; background: #888; }
        .visualizer-icon span:nth-child(5) { animation-delay: 0.1s; background: #666; }
        .visualizer-icon span:nth-child(6) { animation-delay: 0.5s; background: #777; }
        .visualizer-icon span:nth-child(7) { animation-delay: 0.15s; background: #999; }

        @keyframes wave {
            0%, 100% { height: 25px; }
            50% { height: 55px; }
        }

        .current-time-large {
            position: absolute;
            bottom: 15px;
            right: 25px;
            font-family: 'Courier New', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            color: rgba(255,255,255,0.2);
            letter-spacing: 3px;
        }

        /* الوقت وشريط التقدم */
        .time-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            color: #aaa;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .time-current, .time-total {
            background: #111;
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid #333;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #ddd;
        }

        .progress-container {
            margin-bottom: 2rem;
        }

        #progressBar {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: #222;
            border-radius: 20px;
            outline: none;
            cursor: pointer;
        }

        #progressBar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            border: 2px solid #000;
            transition: transform 0.1s;
        }

        #progressBar::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* أزرار التحكم بالتأخير فقط */
        .delay-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .delay-title {
            color: #888;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: #111;
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid #333;
        }

        .delay-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .delay-btn {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .delay-btn:hover {
            background: #1a1a1a;
            border-color: #888;
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
        }

        .delay-btn:active {
            transform: scale(0.95);
        }

        .delay-icon {
            font-size: 1.6rem;
            line-height: 1;
        }

        .delay-text {
            font-size: 0.9rem;
            color: #fff;
            margin-top: 2px;
        }

        .delay-value {
            font-size: 0.7rem;
            color: #aaa;
        }

        .delay-input-container {
            display: flex;
            align-items: center;
            background: #111;
            border: 1px solid #444;
            border-radius: 50px;
            padding: 5px 10px 5px 20px;
            min-width: 220px;
        }

        #delayInput {
            width: 80px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.4rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            outline: none;
            padding: 10px 0;
        }

        .delay-input-container span {
            color: #888;
            font-size: 1rem;
            margin: 0 5px;
        }

        #applyDelayBtn {
            background: #222;
            border: none;
            border-radius: 40px;
            padding: 10px 22px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #555;
            font-weight: 600;
        }

        #applyDelayBtn:hover {
            background: #333;
            border-color: #888;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* زر التحكم الرئيسي */
        .control-center {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
        }

        #playPauseBtn {
            background: #111;
            border: 2px solid #444;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
        }

        #playPauseBtn:hover {
            border-color: #aaa;
            transform: scale(1.1);
            background: #1a1a1a;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        #playPauseBtn:active {
            transform: scale(0.95);
        }

        .play-icon, .pause-icon {
            font-size: 3rem;
            line-height: 1;
        }

        .pause-icon {
            font-size: 2.8rem;
        }

        /* التحكم بالصوت */
        .volume-section {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #111;
            padding: 15px 25px;
            border-radius: 60px;
            border: 1px solid #333;
        }

        .volume-icon {
            color: #888;
            font-size: 1.3rem;
        }

        #volumeSlider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #333;
            border-radius: 10px;
            outline: none;
        }

        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        #volumeValue {
            color: #aaa;
            font-size: 1rem;
            font-weight: 600;
            min-width: 50px;
            text-align: right;
            font-family: 'Courier New', monospace;
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="max-player">
        <!-- مشغل الصوت المخفي -->
        <audio id="audioPlayer" preload="metadata"></audio>

        <!-- المنطقة البصرية مع عرض الوقت الكبير -->
        <div class="visualizer">
            <div class="visualizer-icon">
                <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="current-time-large" id="largeTimeDisplay">00:00</div>
        </div>

        <!-- الوقت التفصيلي -->
        <div class="time-container">
            <span class="time-current" id="currentTime">00:00</span>
            <span class="time-total" id="duration">00:00</span>
        </div>
        
        <!-- شريط التقدم (Time Shift) -->
        <div class="progress-container">
            <input type="range" id="progressBar" value="0" step="0.1">
        </div>

        <!-- قسم التأخير - تحكم دقيق بالمدة الزمنية -->
        <div class="delay-control">
            <div class="delay-title">⏪ تأخير الصوت</div>
            <div class="delay-buttons">
                <button class="delay-btn" id="delay1Btn">
                    <span class="delay-icon">⏪</span>
                    <span class="delay-text">1</span>
                    <span class="delay-value">ثانية</span>
                </button>
                
                <button class="delay-btn" id="delay3Btn">
                    <span class="delay-icon">⏪</span>
                    <span class="delay-text">3</span>
                    <span class="delay-value">ثواني</span>
                </button>
                
                <button class="delay-btn" id="delay5Btn">
                    <span class="delay-icon">⏪</span>
                    <span class="delay-text">5</span>
                    <span class="delay-value">ثواني</span>
                </button>
                
                <button class="delay-btn" id="delay10Btn">
                    <span class="delay-icon">⏪</span>
                    <span class="delay-text">10</span>
                    <span class="delay-value">ثواني</span>
                </button>
            </div>
            
            <div class="delay-input-container">
                <input type="number" id="delayInput" min="0" value="2" step="0.5">
                <span>ث</span>
                <button id="applyDelayBtn">تأخير</button>
            </div>
        </div>

        <!-- زر التحكم الرئيسي (تشغيل/إيقاف) -->
        <div class="control-center">
            <button id="playPauseBtn">
                <span id="playPauseIcon" class="play-icon">▶</span>
            </button>
        </div>

        <!-- التحكم بالصوت -->
        <div class="volume-section">
            <span class="volume-icon">🔊</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
            <span id="volumeValue">70%</span>
        </div>
    </div>

    <script>
        (function() {
            // 🔴 الرابط الصوتي مضمن هنا - غير الرابط إلى ما تريد
            const AUDIO_URL = 'https://anisfm.ddns.net';
            
            // العناصر
            const audio = document.getElementById('audioPlayer');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const playPauseIcon = document.getElementById('playPauseIcon');
            const progressBar = document.getElementById('progressBar');
            const currentTimeSpan = document.getElementById('currentTime');
            const durationSpan = document.getElementById('duration');
            const largeTimeDisplay = document.getElementById('largeTimeDisplay');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeValue = document.getElementById('volumeValue');
            
            // أزرار التأخير
            const delay1Btn = document.getElementById('delay1Btn');
            const delay3Btn = document.getElementById('delay3Btn');
            const delay5Btn = document.getElementById('delay5Btn');
            const delay10Btn = document.getElementById('delay10Btn');
            const delayInput = document.getElementById('delayInput');
            const applyDelayBtn = document.getElementById('applyDelayBtn');

            // حالة التشغيل
            let isPlaying = false;
            let isSeeking = false;

            // دالة تنسيق الوقت
            function formatTime(seconds) {
                if (isNaN(seconds) || seconds < 0) return '00:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            // تحديث جميع عناصر الوقت
            function updateTimeDisplay() {
                const current = audio.currentTime || 0;
                const formatted = formatTime(current);
                currentTimeSpan.textContent = formatted;
                largeTimeDisplay.textContent = formatted;
                
                if (!isSeeking) {
                    progressBar.value = current;
                }
            }

            // تحديث أيقونة الزر
            function updatePlayPauseIcon() {
                if (isPlaying) {
                    playPauseIcon.textContent = '⏸';
                    playPauseIcon.className = 'pause-icon';
                } else {
                    playPauseIcon.textContent = '▶';
                    playPauseIcon.className = 'play-icon';
                }
            }

            // دالة لتأخير الصوت (الرجوع للخلف)
            function delayAudio(seconds) {
                if (!audio.duration) return;
                // التأكد من أن الوقت الجديد لا يقل عن 0
                let newTime = Math.max(0, audio.currentTime - seconds);
                audio.currentTime = newTime;
                updateTimeDisplay();
                
                // إظهار رسالة تأكيد صغيرة (تظهر في console)
                console.log(`تم تأخير الصوت ${seconds} ثواني`);
            }

            // تحميل الصوت من الرابط المحدد داخلياً
            function loadAudio() {
                audio.src = AUDIO_URL;
                audio.load();
                
                // إعادة ضبط الواجهة
                progressBar.value = 0;
                currentTimeSpan.textContent = '00:00';
                largeTimeDisplay.textContent = '00:00';
                durationSpan.textContent = '00:00';
            }

            // تحميل الصوت عند بدء التشغيل
            loadAudio();

            // زر التشغيل/الإيقاف المؤقت
            playPauseBtn.addEventListener('click', () => {
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                } else {
                    audio.play()
                        .then(() => {
                            isPlaying = true;
                        })
                        .catch(e => {
                            alert('لا يمكن التشغيل: ' + e.message);
                        });
                }
                updatePlayPauseIcon();
            });

            // تحديث الوقت أثناء التشغيل
            audio.addEventListener('timeupdate', () => {
                updateTimeDisplay();
            });

            // تحديث المدة الكلية
            audio.addEventListener('loadedmetadata', () => {
                durationSpan.textContent = formatTime(audio.duration);
                progressBar.max = audio.duration || 0;
                updateTimeDisplay();
            });

            // عند انتهاء التشغيل
            audio.addEventListener('ended', () => {
                isPlaying = false;
                updatePlayPauseIcon();
                audio.currentTime = 0;
                updateTimeDisplay();
            });

            // أحداث شريط التقدم (Time Shift)
            progressBar.addEventListener('mousedown', () => {
                isSeeking = true;
            });

            progressBar.addEventListener('input', () => {
                if (audio.duration) {
                    const formatted = formatTime(progressBar.value);
                    currentTimeSpan.textContent = formatted;
                    largeTimeDisplay.textContent = formatted;
                }
            });

            progressBar.addEventListener('change', () => {
                if (audio.duration) {
                    audio.currentTime = progressBar.value;
                    updateTimeDisplay();
                }
                isSeeking = false;
            });

            // أحداث أزرار التأخير
            delay1Btn.addEventListener('click', () => {
                if (audio.duration) {
                    delayAudio(1);
                }
            });

            delay3Btn.addEventListener('click', () => {
                if (audio.duration) {
                    delayAudio(3);
                }
            });

            delay5Btn.addEventListener('click', () => {
                if (audio.duration) {
                    delayAudio(5);
                }
            });

            delay10Btn.addEventListener('click', () => {
                if (audio.duration) {
                    delayAudio(10);
                }
            });

            // تطبيق تأخير بالمدة المدخلة
            applyDelayBtn.addEventListener('click', () => {
                if (!audio.duration) return;
                
                const seconds = parseFloat(delayInput.value);
                if (isNaN(seconds) || seconds < 0) {
                    alert('الرجاء إدخال رقم صحيح');
                    return;
                }
                
                delayAudio(seconds);
            });

            // السماح بتطبيق التأخير بالضغط على Enter
            delayInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    applyDelayBtn.click();
                }
            });

            // التحكم بالصوت
            volumeSlider.addEventListener('input', () => {
                audio.volume = volumeSlider.value;
                volumeValue.textContent = Math.round(volumeSlider.value * 100) + '%';
            });

            // معالجة الأخطاء
            audio.addEventListener('error', (e) => {
                console.error('خطأ في الصوت:', e);
                alert('تعذر تحميل الملف الصوتي. تحقق من الرابط الداخلي.');
                isPlaying = false;
                updatePlayPauseIcon();
            });

            // تهيئة الصوت
            volumeSlider.value = audio.volume;
            volumeValue.textContent = Math.round(audio.volume * 100) + '%';
        })();
    </script>
</body>
</html>
